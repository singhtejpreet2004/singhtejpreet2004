<svg width="900" height="420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Grid paper pattern -->
    <pattern id="grid" width="22" height="22" patternUnits="userSpaceOnUse">
      <path d="M 22 0 L 0 0 0 22" fill="none" stroke="rgba(0,0,0,0.065)" stroke-width="0.8"/>
    </pattern>

    <!-- Soft shadow -->
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="rgba(0,0,0,0.35)"/>
    </filter>
    <filter id="shadow-sm" x="-15%" y="-15%" width="130%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="10" flood-color="rgba(0,0,0,0.25)"/>
    </filter>

    <!-- Clip paths for rounded windows -->
    <clipPath id="clip-pink">
      <rect x="22" y="22" width="500" height="338" rx="16"/>
    </clipPath>
    <clipPath id="clip-main">
      <rect x="152" y="16" width="578" height="374" rx="16"/>
    </clipPath>
    <clipPath id="clip-small">
      <rect x="692" y="14" width="195" height="162" rx="12"/>
    </clipPath>

    <!-- Vignette -->
    <radialGradient id="vign" cx="50%" cy="50%" r="70%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.38"/>
    </radialGradient>

    <!-- Pink shimmer gradient -->
    <linearGradient id="pink-shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde8ff"/>
      <stop offset="50%" stop-color="#f5c6ff"/>
      <stop offset="100%" stop-color="#e8aaff"/>
    </linearGradient>

    <!-- Teal shimmer -->
    <linearGradient id="teal-shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#cdfaf0"/>
      <stop offset="100%" stop-color="#90e8d4"/>
    </linearGradient>

    <!-- Animations -->
    <style>
      .win-pink {
        transform-box: fill-box;
        transform-origin: center;
        animation: float-pink 7s ease-in-out infinite;
      }
      .win-main {
        transform-box: fill-box;
        transform-origin: center;
        animation: float-main 5.5s ease-in-out infinite;
      }
      .win-small {
        transform-box: fill-box;
        transform-origin: center;
        animation: float-small 9s ease-in-out infinite;
      }
      .dot-blink {
        animation: dot-pulse 2s ease-in-out infinite;
      }
      .cursor {
        animation: cursor-blink 1.1s step-end infinite;
      }
      .line1 { animation: line-appear 0.6s 0.2s both; }
      .line2 { animation: line-appear 0.6s 0.5s both; }
      .line3 { animation: line-appear 0.6s 0.8s both; }
      .line4 { animation: line-appear 0.6s 1.1s both; }
      .pill1 { animation: pill-pop 0.4s 1.4s cubic-bezier(0.34,1.56,0.64,1) both; }
      .pill2 { animation: pill-pop 0.4s 1.6s cubic-bezier(0.34,1.56,0.64,1) both; }
      .pill3 { animation: pill-pop 0.4s 1.8s cubic-bezier(0.34,1.56,0.64,1) both; }
      .pill4 { animation: pill-pop 0.4s 2.0s cubic-bezier(0.34,1.56,0.64,1) both; }
      .pill5 { animation: pill-pop 0.4s 2.2s cubic-bezier(0.34,1.56,0.64,1) both; }

      @keyframes float-pink {
        0%,100% { transform: rotate(-4deg) translateY(0px); }
        50%      { transform: rotate(-4deg) translateY(-11px); }
      }
      @keyframes float-main {
        0%,100% { transform: rotate(1deg) translateY(0px); }
        50%      { transform: rotate(1deg) translateY(-8px); }
      }
      @keyframes float-small {
        0%,100% { transform: rotate(5deg) translateY(0px); }
        50%      { transform: rotate(5deg) translateY(-16px); }
      }
      @keyframes cursor-blink {
        0%,49% { opacity:1; }
        50%,100% { opacity:0; }
      }
      @keyframes dot-pulse {
        0%,100% { opacity:1; }
        50% { opacity:0.5; }
      }
      @keyframes line-appear {
        from { opacity:0; transform:scaleX(0); transform-origin:left; }
        to   { opacity:1; transform:scaleX(1); transform-origin:left; }
      }
      @keyframes pill-pop {
        from { opacity:0; transform:scale(0.5); }
        to   { opacity:1; transform:scale(1); }
      }
    </style>
  </defs>

  <!-- ═══ BACKGROUND ═══ -->
  <rect width="900" height="420" fill="#1b5068"/>
  <!-- Subtle dot texture on bg -->
  <rect width="900" height="420" fill="url(#vign)"/>

  <!-- ═══ BACK PINK WINDOW ═══ -->
  <g class="win-pink" filter="url(#shadow)">
    <rect x="22" y="22" width="500" height="338" rx="16" fill="url(#pink-shine)"/>
    <rect x="22" y="22" width="500" height="338" rx="16" fill="url(#grid)" clip-path="url(#clip-pink)"/>
    <!-- chrome bar -->
    <rect x="22" y="22" width="500" height="42" rx="0" fill="rgba(255,255,255,0.55)" clip-path="url(#clip-pink)"/>
    <path d="M38,22 Q22,22 22,38 L22,64 L522,64 L522,38 Q522,22 506,22 Z" fill="rgba(255,255,255,0.55)"/>
    <!-- traffic lights -->
    <circle cx="50" cy="43" r="6" fill="#ff5f57"/>
    <circle cx="68" cy="43" r="6" fill="#febc2e"/>
    <circle cx="86" cy="43" r="6" fill="#28c840"/>
    <!-- title bar pill -->
    <rect x="178" y="34" width="130" height="18" rx="9" fill="rgba(0,0,0,0.08)"/>
    <text x="243" y="47" text-anchor="middle" font-family="monospace" font-size="10" fill="rgba(0,0,0,0.4)">pipeline.py</text>
    <!-- content blocks -->
    <rect x="42" y="88"  width="160" height="10" rx="5" fill="rgba(130,0,160,0.15)"/>
    <rect x="42" y="108" width="310" height="10" rx="5" fill="rgba(130,0,160,0.10)"/>
    <rect x="42" y="128" width="240" height="10" rx="5" fill="rgba(130,0,160,0.10)"/>
    <rect x="42" y="164" width="420" height="100" rx="10" fill="rgba(255,255,255,0.45)"/>
    <rect x="58" y="182" width="140" height="8" rx="4" fill="rgba(130,0,160,0.15)"/>
    <rect x="58" y="200" width="100" height="8" rx="4" fill="rgba(130,0,160,0.10)"/>
    <rect x="58" y="218" width="180" height="8" rx="4" fill="rgba(130,0,160,0.10)"/>
    <rect x="58" y="236" width="120" height="8" rx="4" fill="rgba(130,0,160,0.08)"/>
    <rect x="42" y="288" width="88" height="26" rx="13" fill="rgba(150,0,180,0.2)"/>
    <rect x="140" y="288" width="110" height="26" rx="13" fill="rgba(150,0,180,0.14)"/>
    <rect x="260" y="288" width="88" height="26" rx="13" fill="rgba(150,0,180,0.2)"/>
  </g>

  <!-- ═══ SMALL TOP-RIGHT TEAL WINDOW ═══ -->
  <g class="win-small" filter="url(#shadow-sm)">
    <rect x="692" y="14" width="195" height="162" rx="12" fill="url(#teal-shine)"/>
    <rect x="692" y="14" width="195" height="162" rx="12" fill="url(#grid)" clip-path="url(#clip-small)"/>
    <!-- chrome -->
    <rect x="692" y="14" width="195" height="36" rx="0" fill="rgba(255,255,255,0.5)" clip-path="url(#clip-small)"/>
    <path d="M704,14 Q692,14 692,26 L692,50 L887,50 L887,26 Q887,14 875,14 Z" fill="rgba(255,255,255,0.5)"/>
    <circle cx="708" cy="32" r="5" fill="#ff5f57"/>
    <circle cx="724" cy="32" r="5" fill="#febc2e"/>
    <circle cx="740" cy="32" r="5" fill="#28c840"/>
    <!-- content lines -->
    <rect x="708" y="62"  width="80"  height="9" rx="4" fill="rgba(0,80,60,0.2)"/>
    <rect x="708" y="80"  width="148" height="9" rx="4" fill="rgba(0,80,60,0.13)"/>
    <rect x="708" y="98"  width="110" height="9" rx="4" fill="rgba(0,80,60,0.13)"/>
    <rect x="708" y="120" width="162" height="34" rx="8" fill="rgba(0,80,60,0.15)"/>
  </g>

  <!-- ═══ MAIN WHITE WINDOW ═══ -->
  <g class="win-main" filter="url(#shadow)">
    <!-- Window body -->
    <rect x="152" y="16" width="578" height="374" rx="16" fill="white"/>
    <!-- Grid overlay -->
    <rect x="152" y="16" width="578" height="374" fill="url(#grid)" clip-path="url(#clip-main)"/>

    <!-- Chrome bar -->
    <path d="M168,16 Q152,16 152,32 L152,62 L730,62 L730,32 Q730,16 714,16 Z" fill="#f5f5f5"/>
    <rect x="152" y="46" width="578" height="16" fill="#f5f5f5" clip-path="url(#clip-main)"/>

    <!-- Traffic lights -->
    <circle cx="182" cy="39" r="6.5" fill="#ff5f57"/>
    <circle cx="202" cy="39" r="6.5" fill="#febc2e"/>
    <circle cx="222" cy="39" r="6.5" fill="#28c840"/>

    <!-- Address bar -->
    <rect x="290" y="27" width="190" height="22" rx="11" fill="#ebebeb"/>
    <text x="385" y="42" text-anchor="middle" font-family="monospace" font-size="10" fill="#888">singhtejpreet2004</text>

    <!-- Tab strip -->
    <rect x="152" y="62" width="578" height="1" fill="#e8e8e8" clip-path="url(#clip-main)"/>

    <!-- ── CONTENT ── -->

    <!-- Name -->
    <text x="182" y="130" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif"
          font-size="40" font-weight="800" fill="#0d1117" letter-spacing="-1">Tejpreet Singh</text>

    <!-- Pink accent underline -->
    <rect x="182" y="137" width="240" height="4" rx="2" fill="#f5c6ff"/>

    <!-- Role line -->
    <text x="182" y="168" font-family="'Courier New', Courier, monospace"
          font-size="13" fill="#555" letter-spacing="0">$ Data Engineer  ·  Stream Analytics  ·  Video Intelligence</text>

    <!-- Decorative code bars (animated) -->
    <rect class="line1" x="182" y="192" width="340" height="9" rx="4.5" fill="#f5c6ff" opacity="0.75"/>
    <rect class="line2" x="182" y="210" width="260" height="9" rx="4.5" fill="#90e8d4" opacity="0.75"/>
    <rect class="line3" x="182" y="228" width="300" height="9" rx="4.5" fill="#f5c6ff" opacity="0.45"/>
    <rect class="line4" x="182" y="246" width="200" height="9" rx="4.5" fill="#90e8d4" opacity="0.45"/>

    <!-- Separator -->
    <line x1="182" y1="274" x2="718" y2="274" stroke="#efefef" stroke-width="1"/>

    <!-- Pills (animated pop-in) -->
    <g class="pill1">
      <rect x="182" y="285" width="76" height="26" rx="13" fill="#f5c6ff"/>
      <text x="220" y="302" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" fill="#7b1fa2" font-weight="700">Kafka</text>
    </g>
    <g class="pill2">
      <rect x="268" y="285" width="80" height="26" rx="13" fill="#90e8d4"/>
      <text x="308" y="302" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" fill="#00695c" font-weight="700">PySpark</text>
    </g>
    <g class="pill3">
      <rect x="358" y="285" width="80" height="26" rx="13" fill="#f5c6ff"/>
      <text x="398" y="302" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" fill="#7b1fa2" font-weight="700">OpenCV</text>
    </g>
    <g class="pill4">
      <rect x="448" y="285" width="76" height="26" rx="13" fill="#90e8d4"/>
      <text x="486" y="302" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" fill="#00695c" font-weight="700">Docker</text>
    </g>
    <g class="pill5">
      <rect x="534" y="285" width="80" height="26" rx="13" fill="#f5c6ff"/>
      <text x="574" y="302" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" fill="#7b1fa2" font-weight="700">FastAPI</text>
    </g>

    <!-- Terminal prompt -->
    <text x="182" y="356" font-family="'Courier New', Courier, monospace"
          font-size="13" fill="#aaaaaa">~/projects $</text>
    <text x="270" y="356" font-family="'Courier New', Courier, monospace"
          font-size="13" fill="#555">building at scale</text>
    <rect class="cursor" x="448" y="341" width="2" height="17" fill="#0d1117"/>
  </g>
</svg>
