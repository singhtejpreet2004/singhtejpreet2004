<svg width="900" height="280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="22" height="22" patternUnits="userSpaceOnUse">
      <path d="M 22 0 L 0 0 0 22" fill="none" stroke="rgba(0,0,0,0.055)" stroke-width="0.8"/>
    </pattern>
    <clipPath id="cw"><rect x="18" y="18" width="864" height="244" rx="16"/></clipPath>
    <filter id="sh"><feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="rgba(0,0,0,0.3)"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 2 L 9 5 L 0 8 Z" fill="#1b5068"/>
    </marker>
    <style>
      .box{animation:pop .5s cubic-bezier(.34,1.56,.64,1) both}
      .box:nth-child(1){animation-delay:.05s}
      .box:nth-child(2){animation-delay:.18s}
      .box:nth-child(3){animation-delay:.31s}
      .box:nth-child(4){animation-delay:.44s}
      .box:nth-child(5){animation-delay:.57s}
      .flow-line{animation:draw 0.6s 0.7s both;stroke-dasharray:200;stroke-dashoffset:0}
      .stat-pill{animation:si .4s both}
      .stat-pill:nth-child(1){animation-delay:.9s}
      .stat-pill:nth-child(2){animation-delay:1.05s}
      .stat-pill:nth-child(3){animation-delay:1.2s}
      @keyframes pop{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:none}}
      @keyframes draw{from{stroke-dashoffset:200}to{stroke-dashoffset:0}}
      @keyframes si{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
    </style>
  </defs>

  <rect width="900" height="280" fill="#1b5068"/>

  <!-- Window -->
  <rect x="18" y="18" width="864" height="244" rx="16" fill="white" filter="url(#sh)"/>
  <rect x="18" y="18" width="864" height="244" fill="url(#grid)" clip-path="url(#cw)"/>

  <!-- Chrome -->
  <path d="M34,18 Q18,18 18,34 L18,60 L882,60 L882,34 Q882,18 866,18 Z" fill="#f4f4f4"/>
  <rect x="18" y="48" width="864" height="12" fill="#f4f4f4" clip-path="url(#cw)"/>
  <line x1="18" y1="60" x2="882" y2="60" stroke="#e5e5e5" stroke-width="1"/>
  <circle cx="46" cy="39" r="6.5" fill="#ff5f57"/>
  <circle cx="66" cy="39" r="6.5" fill="#febc2e"/>
  <circle cx="86" cy="39" r="6.5" fill="#28c840"/>
  <rect x="188" y="27" width="130" height="20" rx="10" fill="#e8e8e8"/>
  <text x="253" y="41" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="#777">pipeline.py --run</text>

  <!-- Pipeline boxes -->
  <!-- RTSP ingest -->
  <g class="box">
    <rect x="38" y="90" width="118" height="72" rx="10" fill="#fca5a5" stroke="#dc2626" stroke-width="1.5"/>
    <text x="97" y="122" text-anchor="middle" font-family="'Courier New',monospace" font-size="12" fill="#7f1d1d" font-weight="700">RTSP</text>
    <text x="97" y="138" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="#991b1b">ingest</text>
    <text x="97" y="108" text-anchor="middle" font-size="16">🎥</text>
  </g>
  <!-- Kafka -->
  <g class="box">
    <rect x="212" y="90" width="118" height="72" rx="10" fill="#f5c6ff" stroke="#d080f0" stroke-width="1.5"/>
    <text x="271" y="122" text-anchor="middle" font-family="'Courier New',monospace" font-size="12" fill="#7b1fa2" font-weight="700">Kafka</text>
    <text x="271" y="138" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="#7b1fa2">message bus</text>
    <text x="271" y="108" text-anchor="middle" font-size="16">⚡</text>
  </g>
  <!-- PySpark -->
  <g class="box">
    <rect x="386" y="90" width="128" height="72" rx="10" fill="#c4b5fd" stroke="#7c3aed" stroke-width="1.5"/>
    <text x="450" y="122" text-anchor="middle" font-family="'Courier New',monospace" font-size="12" fill="#4c1d95" font-weight="700">PySpark</text>
    <text x="450" y="138" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="#4c1d95">streaming</text>
    <text x="450" y="108" text-anchor="middle" font-size="16">🔀</text>
  </g>
  <!-- ML Inference -->
  <g class="box">
    <rect x="570" y="90" width="128" height="72" rx="10" fill="#90e8d4" stroke="#40b090" stroke-width="1.5"/>
    <text x="634" y="122" text-anchor="middle" font-family="'Courier New',monospace" font-size="12" fill="#00695c" font-weight="700">ML Model</text>
    <text x="634" y="138" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="#00695c">inference</text>
    <text x="634" y="108" text-anchor="middle" font-size="16">🤖</text>
  </g>
  <!-- PostgreSQL -->
  <g class="box">
    <rect x="754" y="90" width="110" height="72" rx="10" fill="#fde68a" stroke="#d4a000" stroke-width="1.5"/>
    <text x="809" y="118" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" fill="#7c5a00" font-weight="700">Postgres</text>
    <text x="809" y="132" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="#7c5a00">+ Redis</text>
    <text x="809" y="108" text-anchor="middle" font-size="14">🛢️</text>
  </g>

  <!-- Connecting arrows -->
  <line class="flow-line" x1="157" y1="126" x2="209" y2="126" stroke="#1b5068" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line class="flow-line" x1="331" y1="126" x2="383" y2="126" stroke="#1b5068" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line class="flow-line" x1="515" y1="126" x2="567" y2="126" stroke="#1b5068" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line class="flow-line" x1="699" y1="126" x2="751" y2="126" stroke="#1b5068" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Stat pills at bottom -->
  <g class="stat-pill">
    <rect x="38" y="186" width="130" height="28" rx="14" fill="#f5c6ff"/>
    <text x="103" y="204" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" fill="#7b1fa2" font-weight="600">30+ concurrent streams</text>
  </g>
  <g class="stat-pill">
    <rect x="184" y="186" width="132" height="28" rx="14" fill="#90e8d4"/>
    <text x="250" y="204" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" fill="#00695c" font-weight="600">sub-second latency</text>
  </g>
  <g class="stat-pill">
    <rect x="332" y="186" width="126" height="28" rx="14" fill="#fde68a"/>
    <text x="395" y="204" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" fill="#7c5a00" font-weight="600">production grade</text>
  </g>

  <!-- Right: live indicator -->
  <circle cx="780" cy="200" r="5" fill="#28c840"/>
  <circle cx="780" cy="200" r="9" fill="none" stroke="#28c840" stroke-width="1.5" opacity=".5"/>
  <text x="793" y="204" font-family="'Courier New',monospace" font-size="11" fill="#555" font-weight="600">pipeline running</text>
</svg>
