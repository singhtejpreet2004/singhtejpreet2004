<svg width="900" height="390" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="22" height="22" patternUnits="userSpaceOnUse">
      <path d="M 22 0 L 0 0 0 22" fill="none" stroke="rgba(0,0,0,0.055)" stroke-width="0.8"/>
    </pattern>
    <clipPath id="cw"><rect x="18" y="18" width="864" height="354" rx="16"/></clipPath>
    <filter id="sh"><feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="rgba(0,0,0,0.3)"/></filter>
    <style>
      .r1{animation:si 0.4s 0.05s both}
      .r2{animation:si 0.4s 0.18s both}
      .r3{animation:si 0.4s 0.31s both}
      .r4{animation:si 0.4s 0.44s both}
      .r5{animation:si 0.4s 0.57s both}
      .glow{animation:glo 3s ease-in-out infinite}
      @keyframes si{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:none}}
      @keyframes glo{0%,100%{opacity:.7}50%{opacity:1}}
    </style>
  </defs>

  <rect width="900" height="390" fill="#1b5068"/>

  <!-- Window -->
  <rect x="18" y="18" width="864" height="354" rx="16" fill="white" filter="url(#sh)"/>
  <rect x="18" y="18" width="864" height="354" fill="url(#grid)" clip-path="url(#cw)"/>

  <!-- Chrome -->
  <path d="M34,18 Q18,18 18,34 L18,60 L882,60 L882,34 Q882,18 866,18 Z" fill="#f4f4f4"/>
  <rect x="18" y="48" width="864" height="12" fill="#f4f4f4" clip-path="url(#cw)"/>
  <line x1="18" y1="60" x2="882" y2="60" stroke="#e5e5e5" stroke-width="1"/>
  <circle cx="46" cy="39" r="6.5" fill="#ff5f57"/>
  <circle cx="66" cy="39" r="6.5" fill="#febc2e"/>
  <circle cx="86" cy="39" r="6.5" fill="#28c840"/>
  <rect x="188" y="27" width="120" height="20" rx="10" fill="#e8e8e8"/>
  <text x="248" y="41" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="#777">pip list --all</text>

  <!-- ── ROW 1: Streaming & Data ── -->
  <g class="r1">
    <text x="40" y="95" font-family="'Courier New',monospace" font-size="11" fill="#888" letter-spacing="1">STREAMING &amp; DATA</text>
    <!-- Kafka -->
    <rect x="220" y="80" width="68" height="26" rx="13" fill="#f5c6ff"/>
    <text x="254" y="97" text-anchor="middle" font-family="'Courier New',monospace" font-size="11.5" fill="#7b1fa2" font-weight="700">Kafka</text>
    <!-- PySpark -->
    <rect x="296" y="80" width="78" height="26" rx="13" fill="#f5c6ff"/>
    <text x="335" y="97" text-anchor="middle" font-family="'Courier New',monospace" font-size="11.5" fill="#7b1fa2" font-weight="700">PySpark</text>
    <!-- Spark -->
    <rect x="382" y="80" width="62" height="26" rx="13" fill="#f5c6ff"/>
    <text x="413" y="97" text-anchor="middle" font-family="'Courier New',monospace" font-size="11.5" fill="#7b1fa2" font-weight="700">Spark</text>
    <!-- Avro -->
    <rect x="452" y="80" width="56" height="26" rx="13" fill="#f5c6ff"/>
    <text x="480" y="97" text-anchor="middle" font-family="'Courier New',monospace" font-size="11.5" fill="#7b1fa2" font-weight="700">Avro</text>
    <!-- Airflow -->
    <rect x="516" y="80" width="72" height="26" rx="13" fill="#f5c6ff"/>
    <text x="552" y="97" text-anchor="middle" font-family="'Courier New',monospace" font-size="11.5" fill="#7b1fa2" font-weight="700">Airflow</text>
  </g>
  <line x1="40" y1="118" x2="860" y2="118" stroke="#f0f0f0" stroke-width="1"/>

  <!-- ── ROW 2: Languages ── -->
  <g class="r2">
    <text x="40" y="143" font-family="'Courier New',monospace" font-size="11" fill="#888" letter-spacing="1">LANGUAGES</text>
    <rect x="220" y="128" width="72" height="26" rx="13" fill="#90e8d4"/>
    <text x="256" y="145" text-anchor="middle" font-family="'Courier New',monospace" font-size="11.5" fill="#00695c" font-weight="700">Python</text>
    <rect x="300" y="128" width="46" height="26" rx="13" fill="#90e8d4"/>
    <text x="323" y="145" text-anchor="middle" font-family="'Courier New',monospace" font-size="11.5" fill="#00695c" font-weight="700">SQL</text>
    <rect x="354" y="128" width="52" height="26" rx="13" fill="#90e8d4"/>
    <text x="380" y="145" text-anchor="middle" font-family="'Courier New',monospace" font-size="11.5" fill="#00695c" font-weight="700">Bash</text>
    <rect x="414" y="128" width="54" height="26" rx="13" fill="#90e8d4"/>
    <text x="441" y="145" text-anchor="middle" font-family="'Courier New',monospace" font-size="11.5" fill="#00695c" font-weight="700">YAML</text>
  </g>
  <line x1="40" y1="166" x2="860" y2="166" stroke="#f0f0f0" stroke-width="1"/>

  <!-- ── ROW 3: Infrastructure ── -->
  <g class="r3">
    <text x="40" y="191" font-family="'Courier New',monospace" font-size="11" fill="#888" letter-spacing="1">INFRASTRUCTURE</text>
    <rect x="220" y="176" width="66" height="26" rx="13" fill="#1b5068"/>
    <text x="253" y="193" text-anchor="middle" font-family="'Courier New',monospace" font-size="11.5" fill="white" font-weight="700">Docker</text>
    <rect x="294" y="176" width="96" height="26" rx="13" fill="#1b5068"/>
    <text x="342" y="193" text-anchor="middle" font-family="'Courier New',monospace" font-size="11.5" fill="white" font-weight="700">Kubernetes</text>
    <rect x="398" y="176" width="86" height="26" rx="13" fill="#1b5068"/>
    <text x="441" y="193" text-anchor="middle" font-family="'Courier New',monospace" font-size="11.5" fill="white" font-weight="700">Terraform</text>
    <rect x="492" y="176" width="76" height="26" rx="13" fill="#1b5068"/>
    <text x="530" y="193" text-anchor="middle" font-family="'Courier New',monospace" font-size="11.5" fill="white" font-weight="700">Ansible</text>
    <rect x="576" y="176" width="58" height="26" rx="13" fill="#1b5068"/>
    <text x="605" y="193" text-anchor="middle" font-family="'Courier New',monospace" font-size="11.5" fill="white" font-weight="700">Linux</text>
  </g>
  <line x1="40" y1="214" x2="860" y2="214" stroke="#f0f0f0" stroke-width="1"/>

  <!-- ── ROW 4: APIs & Frameworks ── -->
  <g class="r4">
    <text x="40" y="239" font-family="'Courier New',monospace" font-size="11" fill="#888" letter-spacing="1">APIS &amp; FRAMEWORKS</text>
    <rect x="220" y="224" width="74" height="26" rx="13" fill="#c4b5fd"/>
    <text x="257" y="241" text-anchor="middle" font-family="'Courier New',monospace" font-size="11.5" fill="#4c1d95" font-weight="700">FastAPI</text>
    <rect x="302" y="224" width="100" height="26" rx="13" fill="#c4b5fd"/>
    <text x="352" y="241" text-anchor="middle" font-family="'Courier New',monospace" font-size="11.5" fill="#4c1d95" font-weight="700">SQLAlchemy</text>
    <rect x="410" y="224" width="80" height="26" rx="13" fill="#c4b5fd"/>
    <text x="450" y="241" text-anchor="middle" font-family="'Courier New',monospace" font-size="11.5" fill="#4c1d95" font-weight="700">Pydantic</text>
    <rect x="498" y="224" width="74" height="26" rx="13" fill="#c4b5fd"/>
    <text x="535" y="241" text-anchor="middle" font-family="'Courier New',monospace" font-size="11.5" fill="#4c1d95" font-weight="700">Alembic</text>
  </g>
  <line x1="40" y1="262" x2="860" y2="262" stroke="#f0f0f0" stroke-width="1"/>

  <!-- ── ROW 5: ML & Vision ── -->
  <g class="r5">
    <text x="40" y="287" font-family="'Courier New',monospace" font-size="11" fill="#888" letter-spacing="1">ML &amp; VISION</text>
    <rect x="220" y="272" width="72" height="26" rx="13" fill="#fca5a5"/>
    <text x="256" y="289" text-anchor="middle" font-family="'Courier New',monospace" font-size="11.5" fill="#991b1b" font-weight="700">OpenCV</text>
    <rect x="300" y="272" width="54" height="26" rx="13" fill="#fca5a5"/>
    <text x="327" y="289" text-anchor="middle" font-family="'Courier New',monospace" font-size="11.5" fill="#991b1b" font-weight="700">RTSP</text>
    <rect x="362" y="272" width="64" height="26" rx="13" fill="#fca5a5"/>
    <text x="394" y="289" text-anchor="middle" font-family="'Courier New',monospace" font-size="11.5" fill="#991b1b" font-weight="700">NumPy</text>
    <rect x="434" y="272" width="68" height="26" rx="13" fill="#fca5a5"/>
    <text x="468" y="289" text-anchor="middle" font-family="'Courier New',monospace" font-size="11.5" fill="#991b1b" font-weight="700">Pandas</text>
    <rect x="510" y="272" width="100" height="26" rx="13" fill="#fca5a5"/>
    <text x="560" y="289" text-anchor="middle" font-family="'Courier New',monospace" font-size="11.5" fill="#991b1b" font-weight="700">scikit-learn</text>
  </g>

  <!-- Bottom bar -->
  <line x1="18" y1="332" x2="882" y2="332" stroke="#f0f0f0" stroke-width="1"/>
  <text x="40" y="352" font-family="'Courier New',monospace" font-size="10" fill="#bbb">5 categories  ·  22 technologies  ·  production-grade</text>
  <rect x="792" y="336" width="76" height="22" rx="11" fill="#f5c6ff" class="glow"/>
  <text x="830" y="351" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="#7b1fa2" font-weight="600">explore →</text>
</svg>
