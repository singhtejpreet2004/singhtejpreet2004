<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Stack — Tejpreet Singh</title>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--teal:#1b5068;--teal-dark:#0d2433;--pink:#f5c6ff;--mint:#90e8d4;--muted:#5a7a8a;--border:#d4e8f0;--text:#0d1117}
    html,body{width:100%;height:100%;overflow:hidden}
    body{background-color:var(--teal);background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:22px 22px;font-family:'Inter',sans-serif;color:var(--text)}

    nav{position:fixed;top:0;left:0;right:0;z-index:200;background:white;border-bottom:2px solid var(--border);height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;box-shadow:0 2px 20px rgba(0,0,0,.15)}
    .nav-brand{font-family:'Fira Code',monospace;font-size:.85rem;color:var(--teal);font-weight:600}
    .nav-links{display:flex;gap:4px}
    .nav-links a{font-family:'Fira Code',monospace;font-size:.78rem;color:var(--muted);text-decoration:none;padding:5px 12px;border-radius:6px;transition:all .2s}
    .nav-links a:hover,.nav-links a.on{background:var(--teal);color:white}

    #graph-wrap{position:fixed;top:52px;left:0;right:0;bottom:0}
    svg{width:100%;height:100%}

    /* Legend - macOS window style */
    #legend{position:fixed;bottom:24px;left:24px;z-index:100;background:white;border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,.2);overflow:hidden;min-width:180px}
    .leg-chrome{height:36px;background:#f4f4f4;border-bottom:1px solid #e5e5e5;display:flex;align-items:center;padding:0 12px;gap:6px}
    .ldot{width:10px;height:10px;border-radius:50%}
    .l-r{background:#ff5f57}.l-y{background:#febc2e}.l-g{background:#28c840}
    .leg-body{padding:12px 16px;background-image:linear-gradient(rgba(0,0,0,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,.02) 1px,transparent 1px);background-size:22px 22px}
    .leg-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;font-size:.73rem;color:var(--muted);font-family:'Fira Code',monospace}
    .leg-row:last-child{margin-bottom:0}
    .leg-circ{width:10px;height:10px;border-radius:50%;flex-shrink:0}

    /* Hint - macOS window style */
    #hint{position:fixed;bottom:24px;right:24px;z-index:100;background:white;border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,.2);overflow:hidden}
    .hint-body{padding:12px 16px;font-family:'Fira Code',monospace;font-size:.72rem;color:var(--muted);line-height:1.9;background-image:linear-gradient(rgba(0,0,0,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,.02) 1px,transparent 1px);background-size:22px 22px}

    /* Tooltip - macOS window style */
    #tooltip{position:fixed;z-index:300;display:none;pointer-events:none;background:white;border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,.25);overflow:hidden;min-width:200px}
    .tt-chrome{height:36px;background:#f4f4f4;border-bottom:1px solid #e5e5e5;display:flex;align-items:center;padding:0 12px;gap:6px}
    .tt-body{padding:14px 16px;background-image:linear-gradient(rgba(0,0,0,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,.025) 1px,transparent 1px);background-size:22px 22px}
    .tt-name{font-weight:700;font-size:1rem;margin-bottom:2px}
    .tt-cat{font-size:.7rem;text-transform:uppercase;letter-spacing:1px;font-family:'Fira Code',monospace;margin-bottom:10px}
    .tt-exp-label{font-size:.75rem;color:var(--muted);font-family:'Fira Code',monospace;margin-bottom:5px}
    .tt-bar-bg{height:5px;background:#f0f0f0;border-radius:3px;overflow:hidden}
    .tt-bar-fill{height:100%;border-radius:3px;transition:width .3s}
    .tt-note{font-size:.75rem;color:var(--muted);margin-top:10px;line-height:1.5;font-family:'Fira Code',monospace}

    /* Title overlay */
    #page-title{position:fixed;top:68px;left:50%;transform:translateX(-50%);z-index:50;text-align:center;padding-top:16px;pointer-events:none}
    #page-title h1{font-size:1.1rem;font-weight:800;color:white;text-shadow:0 2px 8px rgba(0,0,0,.4);margin-bottom:2px}
    #page-title p{font-family:'Fira Code',monospace;font-size:.72rem;color:rgba(255,255,255,.6)}
  </style>
</head>
<body>
  <nav>
    <span class="nav-brand">tejpreet@dev:~/stack</span>
    <div class="nav-links">
      <a href="../">home</a>
      <a href="../stats/">stats</a>
      <a href="./" class="on">stack</a>
      <a href="https://github.com/singhtejpreet2004" target="_blank">github ↗</a>
    </div>
  </nav>

  <div id="page-title">
    <h1>🔬 Interactive Tech Stack</h1>
    <p>drag · hover · click to explore connections</p>
  </div>

  <div id="graph-wrap"></div>

  <div id="legend">
    <div class="leg-chrome"><div class="ldot l-r"></div><div class="ldot l-y"></div><div class="ldot l-g"></div></div>
    <div class="leg-body">
      <div class="leg-row"><div class="leg-circ" style="background:#f5c6ff;border:1.5px solid #d080f0"></div>Streaming &amp; Data</div>
      <div class="leg-row"><div class="leg-circ" style="background:#90e8d4;border:1.5px solid #40b090"></div>Infrastructure</div>
      <div class="leg-row"><div class="leg-circ" style="background:#1b5068;border:1.5px solid #0d2433"></div>Languages</div>
      <div class="leg-row"><div class="leg-circ" style="background:#fde68a;border:1.5px solid #d4a000"></div>Databases</div>
      <div class="leg-row"><div class="leg-circ" style="background:#c4b5fd;border:1.5px solid #7c3aed"></div>Frameworks</div>
      <div class="leg-row"><div class="leg-circ" style="background:#fca5a5;border:1.5px solid #dc2626"></div>ML &amp; Vision</div>
    </div>
  </div>

  <div id="hint">
    <div class="leg-chrome"><div class="ldot l-r"></div><div class="ldot l-y"></div><div class="ldot l-g"></div></div>
    <div class="hint-body">
      drag &nbsp;&nbsp;→ reposition<br/>
      hover &nbsp;→ details<br/>
      click &nbsp;&nbsp;→ highlight links<br/>
      scroll → zoom
    </div>
  </div>

  <div id="tooltip">
    <div class="tt-chrome"><div class="ldot l-r"></div><div class="ldot l-y"></div><div class="ldot l-g"></div></div>
    <div class="tt-body">
      <div class="tt-name" id="tt-name"></div>
      <div class="tt-cat" id="tt-cat"></div>
      <div class="tt-exp-label" id="tt-exp-label">experience</div>
      <div class="tt-bar-bg"><div class="tt-bar-fill" id="tt-bar"></div></div>
      <div class="tt-note" id="tt-note"></div>
    </div>
  </div>

  <script>
    const CAT_COLORS = {
      streaming: { fill:'#f5c6ff', stroke:'#d080f0', text:'#7b1fa2' },
      infra:     { fill:'#90e8d4', stroke:'#40b090', text:'#00695c' },
      languages: { fill:'#1b5068', stroke:'#0d2433', text:'#ffffff' },
      databases: { fill:'#fde68a', stroke:'#d4a000', text:'#7c5a00' },
      frameworks:{ fill:'#c4b5fd', stroke:'#7c3aed', text:'#4c1d95' },
      ml:        { fill:'#fca5a5', stroke:'#dc2626', text:'#991b1b' },
    };

    const nodes = [
      {id:'Kafka',      cat:'streaming',  r:30, exp:90, note:'confluent-kafka · schema registry · DLQ · consumer groups'},
      {id:'PySpark',    cat:'streaming',  r:26, exp:85, note:'Structured Streaming · watermarking · broadcast joins'},
      {id:'Spark',      cat:'streaming',  r:20, exp:80, note:'Catalyst optimizer · batch + streaming'},
      {id:'Avro',       cat:'streaming',  r:15, exp:70, note:'Schema registry + Avro for all prod topics'},
      {id:'Docker',     cat:'infra',      r:26, exp:88, note:'Multi-stage builds · compose · network isolation'},
      {id:'Kubernetes', cat:'infra',      r:24, exp:75, note:'Deployments · services · ConfigMaps on SLES'},
      {id:'Terraform',  cat:'infra',      r:16, exp:65, note:'IaC for remote infra provisioning'},
      {id:'Ansible',    cat:'infra',      r:16, exp:70, note:'Remote automation on SLES Linux'},
      {id:'Linux',      cat:'infra',      r:20, exp:92, note:'SLES · SSH · systemd · daily driver'},
      {id:'Python',     cat:'languages',  r:32, exp:95, note:'3.11 · type hints · async · conda envs'},
      {id:'SQL',        cat:'languages',  r:20, exp:88, note:'Complex queries · window functions · CTEs'},
      {id:'Bash',       cat:'languages',  r:16, exp:80, note:'Cross-platform macOS + Linux scripts'},
      {id:'YAML',       cat:'languages',  r:13, exp:85, note:'K8s manifests · GitHub Actions · Compose'},
      {id:'PostgreSQL', cat:'databases',  r:24, exp:88, note:'QueuePool · Alembic migrations · index design'},
      {id:'Redis',      cat:'databases',  r:18, exp:75, note:'Caching · pub/sub · session store'},
      {id:'FastAPI',    cat:'frameworks', r:22, exp:85, note:'Async endpoints · Pydantic v2 · OpenAPI'},
      {id:'SQLAlchemy', cat:'frameworks', r:17, exp:82, note:'ORM + core · async sessions · connection pooling'},
      {id:'Pydantic',   cat:'frameworks', r:15, exp:88, note:'V2 models · BaseSettings · validators'},
      {id:'OpenCV',     cat:'ml',         r:22, exp:85, note:'RTSP capture · frame extraction · VideoCapture'},
      {id:'RTSP',       cat:'ml',         r:18, exp:80, note:'30+ concurrent streams · reconnect loops'},
      {id:'NumPy',      cat:'ml',         r:16, exp:80, note:'Array ops · image processing pipelines'},
      {id:'Pandas',     cat:'ml',         r:15, exp:75, note:'Data wrangling · EDA · batch transforms'},
    ];

    const links = [
      {source:'Kafka',target:'PySpark'},{source:'Kafka',target:'Avro'},{source:'PySpark',target:'Spark'},
      {source:'PySpark',target:'Python'},{source:'Kafka',target:'Python'},
      {source:'Python',target:'FastAPI'},{source:'Python',target:'SQLAlchemy'},
      {source:'Python',target:'Pydantic'},{source:'Python',target:'OpenCV'},
      {source:'Python',target:'NumPy'},{source:'Python',target:'Pandas'},
      {source:'FastAPI',target:'SQLAlchemy'},{source:'FastAPI',target:'Pydantic'},
      {source:'SQLAlchemy',target:'PostgreSQL'},{source:'PostgreSQL',target:'Redis'},
      {source:'Docker',target:'Kubernetes'},{source:'Docker',target:'Kafka'},
      {source:'Docker',target:'PostgreSQL'},{source:'Kubernetes',target:'Terraform'},
      {source:'Ansible',target:'Linux'},{source:'Linux',target:'Docker'},
      {source:'RTSP',target:'OpenCV'},{source:'OpenCV',target:'Kafka'},
      {source:'NumPy',target:'OpenCV'},{source:'Bash',target:'Linux'},
      {source:'YAML',target:'Docker'},{source:'YAML',target:'Kubernetes'},
      {source:'SQL',target:'PostgreSQL'},{source:'Pandas',target:'PySpark'},
    ];

    const W = window.innerWidth, H = window.innerHeight - 52;
    const svg = d3.select('#graph-wrap').append('svg');
    const g = svg.append('g');

    const zoom = d3.zoom().scaleExtent([0.25,3]).on('zoom', e => g.attr('transform', e.transform));
    svg.call(zoom);

    const sim = d3.forceSimulation(nodes)
      .force('link', d3.forceLink(links).id(d=>d.id).distance(d=>{
        const s=nodes.find(n=>n.id===(d.source.id||d.source));
        const t=nodes.find(n=>n.id===(d.target.id||d.target));
        return (s?s.r:20)+(t?t.r:20)+50;
      }).strength(.55))
      .force('charge', d3.forceManyBody().strength(d=>-d.r*20))
      .force('center', d3.forceCenter(W/2, H/2))
      .force('collision', d3.forceCollide().radius(d=>d.r+22));

    const linkEl = g.append('g').selectAll('line').data(links).join('line')
      .attr('stroke','rgba(255,255,255,0.2)').attr('stroke-width',1.5);

    const nodeG = g.append('g').selectAll('g').data(nodes).join('g').attr('cursor','grab')
      .call(d3.drag()
        .on('start',(e,d)=>{ if(!e.active) sim.alphaTarget(.3).restart(); d.fx=d.x; d.fy=d.y; })
        .on('drag', (e,d)=>{ d.fx=e.x; d.fy=e.y; })
        .on('end',  (e,d)=>{ if(!e.active) sim.alphaTarget(0); d.fx=null; d.fy=null; }));

    nodeG.append('circle')
      .attr('r', d=>d.r)
      .attr('fill', d=>CAT_COLORS[d.cat].fill)
      .attr('stroke', d=>CAT_COLORS[d.cat].stroke)
      .attr('stroke-width', 2)
      .style('filter','drop-shadow(0 4px 12px rgba(0,0,0,0.25))');

    nodeG.append('text')
      .text(d=>d.id)
      .attr('text-anchor','middle').attr('dominant-baseline','central')
      .attr('fill', d=>CAT_COLORS[d.cat].text)
      .attr('font-family','Fira Code, monospace')
      .attr('font-size', d=>Math.max(8,Math.min(12,d.r*.42)))
      .attr('font-weight','600')
      .attr('pointer-events','none');

    const tt = document.getElementById('tooltip');
    const ttName = document.getElementById('tt-name');
    const ttCat  = document.getElementById('tt-cat');
    const ttBar  = document.getElementById('tt-bar');
    const ttNote = document.getElementById('tt-note');

    let selected = null;

    nodeG
      .on('mouseover',(e,d)=>{
        tt.style.display='block';
        ttName.textContent = d.id;
        ttName.style.color = CAT_COLORS[d.cat].stroke;
        ttCat.textContent = d.cat;
        ttCat.style.color = CAT_COLORS[d.cat].stroke;
        ttBar.style.width = d.exp+'%';
        ttBar.style.background = CAT_COLORS[d.cat].stroke;
        ttNote.textContent = d.note;
        d3.select(e.currentTarget).select('circle').attr('stroke-width',3.5).attr('fill',CAT_COLORS[d.cat].stroke);
        d3.select(e.currentTarget).select('text').attr('fill',CAT_COLORS[d.cat].text==='#ffffff'?'white':CAT_COLORS[d.cat].fill);
      })
      .on('mousemove',e=>{
        let tx=e.clientX+16, ty=e.clientY+16;
        if(tx+230>window.innerWidth) tx=e.clientX-230-16;
        if(ty+160>window.innerHeight) ty=e.clientY-160-16;
        tt.style.left=tx+'px'; tt.style.top=ty+'px';
      })
      .on('mouseleave',(e,d)=>{
        tt.style.display='none';
        if(selected!==d.id){
          d3.select(e.currentTarget).select('circle').attr('stroke-width',2).attr('fill',CAT_COLORS[d.cat].fill);
          d3.select(e.currentTarget).select('text').attr('fill',CAT_COLORS[d.cat].text);
        }
      })
      .on('click',(e,d)=>{
        e.stopPropagation();
        selected = selected===d.id ? null : d.id;
        const conn = new Set(links.filter(l=>(l.source.id||l.source)===d.id||(l.target.id||l.target)===d.id).flatMap(l=>[(l.source.id||l.source),(l.target.id||l.target)]));
        nodeG.each(function(n){
          const show=!selected||conn.has(n.id);
          d3.select(this).select('circle').attr('opacity',show?1:.15);
          d3.select(this).select('text').attr('opacity',show?1:.15);
        });
        linkEl.attr('opacity',l=>{ if(!selected) return 0.6; return conn.has(l.source.id||l.source)&&conn.has(l.target.id||l.target)?1:.05; });
      });

    svg.on('click',()=>{
      selected=null;
      nodeG.selectAll('circle').attr('opacity',1);
      nodeG.selectAll('text').attr('opacity',1);
      linkEl.attr('opacity',.6);
    });

    sim.on('tick',()=>{
      linkEl.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
      nodeG.attr('transform',d=>`translate(${d.x},${d.y})`);
    });

    window.addEventListener('resize',()=>{
      const nw=window.innerWidth, nh=window.innerHeight-52;
      sim.force('center',d3.forceCenter(nw/2,nh/2)).alpha(.3).restart();
    });
  </script>
</body>
</html>
